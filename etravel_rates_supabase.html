<html lang="en">

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e0ddd6;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50}
.logo{font-size:16px;font-weight:600}.logo span{color:#185FA5}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.year-tabs{display:flex;gap:4px}
.ytab{padding:4px 13px;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:#555}
.ytab.active{background:#185FA5;border-color:#185FA5;color:#fff}
.sync-status{font-size:11px;padding:3px 10px;border-radius:10px;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.sync-status.error{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.sync-status.loading{background:#e3f2fd;color:#1565c0;border-color:#bbdefb}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sc{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e0ddd6}
.sc-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.sc-val{font-size:22px;font-weight:600}
.stabs{display:flex;gap:0;margin-bottom:12px;border:1px solid #d0cdc6;border-radius:7px;overflow:hidden;flex-wrap:wrap;background:#fff}
.stab{padding:7px 13px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#666;white-space:nowrap}
.stab:hover{background:#f5f4f0}
.stab.active{background:#185FA5;color:#fff}
.search-bar{display:grid;grid-template-columns:2fr 1fr 1fr auto auto;gap:8px;margin-bottom:12px}
.search-bar input,.search-bar select{height:34px;padding:0 10px;border:1px solid #d0cdc6;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;width:100%}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:#185FA5}
.btn{height:34px;padding:0 14px;border:1px solid #d0cdc6;border-radius:6px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;white-space:nowrap}
.btn:hover{background:#f5f4f0}
.btn-primary{background:#185FA5;border-color:#185FA5;color:#fff}
.btn-primary:hover{background:#0e4a82}
.btn-success{background:#0F6E56;border-color:#0F6E56;color:#fff}
.btn-success:hover{background:#0a5441}
.meta{font-size:12px;color:#888;margin-bottom:8px}
.tbl-wrap{background:#fff;border:1px solid #e0ddd6;border-radius:10px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-weight:600;color:#888;border-bottom:1px solid #e8e5df;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;background:#faf9f7}
td{padding:9px 10px;border-bottom:1px solid #f0ede8;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f7}
.price{font-weight:600;color:#185FA5}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap}
.b-transfer{background:#ddeefb;color:#0a4478}
.b-guide{background:#ddf0e3;color:#1a5c2e}
.b-restaurant{background:#fef0dc;color:#7a4410}
.b-hotel{background:#ebe8fd;color:#3d2a8a}
.b-attraction{background:#fde8e2;color:#7a2a18}
.b-cruise{background:#d8f0eb;color:#0a5040}
.b-concert{background:#fce8f2;color:#7a1e4a}
.b-other{background:#eeede8;color:#444}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e0ddd6;padding:22px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fg .full{grid-column:1/-1}
.fg label{font-size:11px;color:#666;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.03em}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid #d0cdc6;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#185FA5}
.fg textarea{resize:vertical;min-height:52px}
.mac{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;border-top:1px solid #e8e5df;padding-top:14px}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.seed-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:10px 14px;font-size:12px;color:#7a5c00;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr}.search-bar{grid-template-columns:1fr 1fr;gap:6px}.search-bar input{grid-column:1/-1}}
</style>
</head>

<div class="header">
  <div class="logo">E-TRAVEL<span>.SK</span> &nbsp;— Buy Rate Finder</div>
  <div class="hright">

    <span class="sync-status loading" id="syncStatus"><span class="spinner"></span>Connecting...</span>
    <button class="btn btn-primary" onclick="openAdd()">+ Add rate</button>
  </div>
</div>

<div class="main">
  <div id="seedBanner" class="seed-banner" style="display:none">
    <span>⚠️ Database is empty. Click to load all 156 default rates.</span>
    <button class="btn btn-primary" onclick="seedDatabase()">Load default rates</button>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="stabs" id="stabs"></div>

  <div class="search-bar">
    <input type="text" id="searchQ" placeholder="Search supplier, service, route, description..." oninput="renderTable()">
    <select id="filterDest" onchange="renderTable()">
      <option value="">All destinations</option>
      <option>Bratislava</option><option>Vienna</option><option>Budapest</option>
      <option>Piešťany</option><option>Pezinok</option><option>Prague</option>
      <option>Salzburg</option><option>Slovakia</option>
    </select>
    <select id="filterSupplier" onchange="renderTable()"><option value="">All suppliers</option></select>
    <button class="btn" onclick="clearSearch()">Clear</button>
    <button class="btn btn-primary" onclick="openAdd()">+ Add</button>
  </div>

  <div class="meta" id="meta"></div>

  <div class="tbl-wrap">
    <table id="rateTable">
      <thead><tr>
        <th>Supplier</th><th>Type</th><th>Destination</th>
        <th>Service / description</th><th>Group / pax</th>
        <th>Buy price</th><th>Unit</th><th>Notes</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none">No rates found.</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
<div class="modal">
  <div class="modal-title" id="modalTitle">Add buy rate</div>
  <div class="fg">
    <div><label>Supplier *</label><input id="fSupplier" placeholder="e.g. ADSERVICE"></div>
    <div><label>Service type *</label>
      <select id="fType">
        <option value="">Select...</option>
        <option>Transfer</option><option>Guide</option><option>Restaurant</option>
        <option>Hotel</option><option>Attraction</option><option>Cruise</option>
        <option>Concert</option><option>Other</option>
      </select>
    </div>
    <div><label>Destination *</label><input id="fDest" placeholder="e.g. Bratislava"></div>
    <div><label>Year *</label>
      <select id="fYear"><option>2026</option><option>2025</option><option>2027</option></select>
    </div>
    <div class="full"><label>Service description *</label><input id="fDesc" placeholder="e.g. BTS airport → hotel center, car 1-3 pax"></div>
    <div><label>Group / pax</label><input id="fGroup" placeholder="e.g. 1-3, group, 20+"></div>
    <div><label>Buy price (EUR) *</label><input type="number" id="fPrice" step="0.01" placeholder="0.00"></div>
    <div><label>Unit</label>
      <select id="fUnit">
        <option>per vehicle/service</option><option>per person</option>
        <option>per group</option><option>per room/night</option><option>per hour</option>
      </select>
    </div>
    <div><label>Valid from</label><input type="date" id="fFrom"></div>
    <div><label>Valid to</label><input type="date" id="fTo"></div>
    <div class="full"><label>Notes / conditions</label><textarea id="fNotes" placeholder="e.g. Incl. VAT, +9% service, 20+1 FOC"></textarea></div>
  </div>
  <div class="mac">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-success" id="saveBtn" onclick="saveRate()">Save rate</button>
  </div>
</div>
</div>

let rates=[];let activeType='All';let editId=null;let curYear='2026';

function setStatus(msg,cls=''){const el=document.getElementById('syncStatus');el.textContent=msg;el.className='sync-status'+(cls?' '+cls:'');}

async function apiFetch(path,opts={}){
  const r=await fetch(API+path,{headers:{...HEADERS,...(opts.headers||{})},method:opts.method||'GET',body:opts.body});
  if(!r.ok){const t=await r.text();throw new Error(t);}
  return opts.method&&opts.method!=='GET'?r:r.json();
}

async function loadRates(){
  setStatus('Loading...','loading');
  try{
    rates=await apiFetch('?order=supplier.asc,type.asc,dest.asc&limit=1000');
    if(rates.length===0){document.getElementById('seedBanner').style.display='flex';}
    else{document.getElementById('seedBanner').style.display='none';}
    setStatus('✓ Live – '+rates.length+' rates');
    renderYears();renderStats();renderStabs();renderTable();populateSupplierFilter();
  }catch(e){setStatus('Connection error','error');console.error(e);}
}

async function seedDatabase(){
  setStatus('Loading 156 rates...','loading');
  document.getElementById('seedBanner').style.display='none';
  try{
    // Insert in batches of 50
    for(let i=0;i<SEED_DATA.length;i+=50){
      const batch=SEED_DATA.slice(i,i+50);
      await apiFetch('',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(batch)});
    }
    await loadRates();
  }catch(e){setStatus('Seed error','error');console.error(e);}
}

function years(){return[...new Set(rates.map(r=>r.year))].sort().reverse();}

function renderYears(){
  const ys=years();if(!ys.includes(curYear))curYear=ys[0]||'2026';
  document.getElementById('yearTabs').innerHTML=ys.map(y=>`<button class="ytab${y===curYear?' active':''}" onclick="setYear('${y}')">${y}</button>`).join('');
}
function setYear(y){curYear=y;renderYears();renderStats();renderStabs();renderTable();populateSupplierFilter();}

function renderStabs(){
  const counts={};rates.filter(r=>r.year===curYear).forEach(r=>{counts[r.type]=(counts[r.type]||0)+1;});
  document.getElementById('stabs').innerHTML=TYPES.map(t=>{
    const c=t==='All'?rates.filter(r=>r.year===curYear).length:(counts[t]||0);
    return`<button class="stab${t===activeType?' active':''}" onclick="switchTab('${t}',this)">${t}${c?' ('+c+')':''}</button>`;
  }).join('');
}
function switchTab(t,el){activeType=t;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTable();}

function populateSupplierFilter(){
  const ss=[...new Set(rates.filter(r=>r.year===curYear).map(r=>r.supplier))].sort();
  document.getElementById('filterSupplier').innerHTML='<option value="">All suppliers</option>'+ss.map(s=>`<option>${s}</option>`).join('');
}

function filtered(){
  const q=document.getElementById('searchQ').value.toLowerCase();
  const fd=document.getElementById('filterDest').value;
  const fs=document.getElementById('filterSupplier').value;
  return rates.filter(r=>{
    if(r.year!==curYear)return false;
    if(activeType!=='All'&&r.type!==activeType)return false;
    if(fd&&r.dest!==fd)return false;
    if(fs&&r.supplier!==fs)return false;
    if(q){const h=[r.supplier,r.type,r.dest,r.description,r.notes||'',r.grp||''].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
}

function renderStats(){
  const yr=rates.filter(r=>r.year===curYear);
  document.getElementById('statsRow').innerHTML=`
    <div class="sc"><div class="sc-label">Total rates</div><div class="sc-val">${yr.length}</div></div>
    <div class="sc"><div class="sc-label">Suppliers</div><div class="sc-val">${[...new Set(yr.map(r=>r.supplier))].length}</div></div>
    <div class="sc"><div class="sc-label">Service types</div><div class="sc-val">${[...new Set(yr.map(r=>r.type))].length}</div></div>
    <div class="sc"><div class="sc-label">Destinations</div><div class="sc-val">${[...new Set(yr.map(r=>r.dest))].length}</div></div>`;
}

function renderTable(){
  const rows=filtered();renderStabs();
  document.getElementById('meta').textContent=rows.length+' rate'+(rows.length!==1?'s':'')+' found';
  document.getElementById('emptyMsg').style.display=rows.length?'none':'block';
  document.getElementById('rateTable').style.display=rows.length?'':'none';
  document.getElementById('tbody').innerHTML=rows.map(r=>`<tr>
    <td style="font-weight:600;white-space:nowrap">${r.supplier}</td>
    <td><span class="badge ${BCLS[r.type]||'b-other'}">${r.type}</span></td>
    <td style="white-space:nowrap">${r.dest}</td>
    <td>${r.description}</td>
    <td style="color:#888;white-space:nowrap">${r.grp||'—'}</td>
    <td class="price" style="white-space:nowrap">${Number(r.price).toFixed(2)} €</td>
    <td style="color:#888;font-size:11px;white-space:nowrap">${r.unit||''}</td>
    <td style="color:#888;font-size:11px;max-width:180px">${r.notes||'—'}</td>
    <td style="white-space:nowrap">
      <button class="btn" style="padding:2px 8px;height:26px;font-size:11px" onclick="editRate(${r.id})">Edit</button>
      <button class="btn" style="padding:2px 6px;height:26px;font-size:11px;margin-left:3px;color:#a00;border-color:#f5c0c0" onclick="delRate(${r.id})">×</button>
    </td></tr>`).join('');
}

function clearSearch(){document.getElementById('searchQ').value='';document.getElementById('filterDest').value='';document.getElementById('filterSupplier').value='';renderTable();}

function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add buy rate';
  ['fSupplier','fDest','fDesc','fGroup','fPrice','fFrom','fTo','fNotes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('fType').value='';
  document.getElementById('fYear').value=curYear;
  document.getElementById('fUnit').value='per vehicle/service';
  document.getElementById('modal').classList.add('open');
}

function editRate(id){
  const r=rates.find(x=>x.id===id);if(!r)return;editId=id;
  document.getElementById('modalTitle').textContent='Edit buy rate';
  document.getElementById('fSupplier').value=r.supplier;
  document.getElementById('fType').value=r.type;
  document.getElementById('fDest').value=r.dest;
  document.getElementById('fYear').value=r.year;
  document.getElementById('fDesc').value=r.description;
  document.getElementById('fGroup').value=r.grp||'';
  document.getElementById('fPrice').value=r.price;
  document.getElementById('fUnit').value=r.unit||'per vehicle/service';
  document.getElementById('fFrom').value=r.valid_from||'';
  document.getElementById('fTo').value=r.valid_to||'';
  document.getElementById('fNotes').value=r.notes||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

async function saveRate(){
  const supplier=document.getElementById('fSupplier').value.trim();
  const type=document.getElementById('fType').value;
  const dest=document.getElementById('fDest').value.trim();
  const year=document.getElementById('fYear').value;
  const description=document.getElementById('fDesc').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value);
  if(!supplier||!type||!dest||!description||isNaN(price)){alert('Please fill all required fields (*)');return;}
  const entry={year,supplier,type,dest,description,grp:document.getElementById('fGroup').value.trim(),price,unit:document.getElementById('fUnit').value,valid_from:document.getElementById('fFrom').value||null,valid_to:document.getElementById('fTo').value||null,notes:document.getElementById('fNotes').value.trim()};
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  try{
    if(editId){
      await apiFetch('?id=eq.'+editId,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(entry)});
    }else{
      await apiFetch('',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(entry)});
    }
    closeModal();
    await loadRates();
  }catch(e){alert('Save failed: '+e.message);}
  btn.textContent='Save rate';btn.disabled=false;
}

async function delRate(id){
  if(!confirm('Delete this rate?'))return;
  try{
    await apiFetch('?id=eq.'+id,{method:'DELETE'});
    await loadRates();
  }catch(e){alert('Delete failed: '+e.message);}
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadRates();
</script>
